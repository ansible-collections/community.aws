  # - name: Assert check_mode shows changed
  #   assert:
  #     that:
  #       - result is changed

  # - name: Configure website with routing rules
  #   community.aws.s3_bucket_website:
  #     state: present
  #     name: '{{ test_bucket }}'
  #     suffix: index.html
  #     error_key: error.html
  #     routing_rules:
  #       - condition:
  #           key_prefix_equals: docs/
  #         redirect:
  #           replace_key_prefix_with: documents/
  #   register: result

  # - name: Assert routing rules were configured
  #   assert:
  #     that:
  #       - result is changed
  #       - result.routing_rules is defined
  #       - result.routing_rules | length == 1

  # - name: Configure website with routing rules idempotency (check_mode)
  #   community.aws.s3_bucket_website:
  #     state: present
  #     name: '{{ test_bucket }}'
  #     suffix: index.html
  #     error_key: error.html
  #     routing_rules:
  #       - condition:
  #           key_prefix_equals: docs/
  #         redirect:
  #           replace_key_prefix_with: documents/
  #   register: result
  #   check_mode: true

  # - name: Assert check_mode shows no change
  #   assert:
  #     that:
  #       - result is not changed

  # - name: Configure website with routing rules idempotency
  #   community.aws.s3_bucket_website:
  #     state: present
  #     name: '{{ test_bucket }}'
  #     suffix: index.html
  #     error_key: error.html
  #     routing_rules:
  #       - condition:
  #           key_prefix_equals: docs/
  #         redirect:
  #           replace_key_prefix_with: documents/
  #   register: result

  # - name: Assert idempotency - no change
  #   assert:
  #     that:
  #       - result is not changed

  # ============================================================
  # Test state=absent - Remove website configuration
  # ============================================================

  - name: Remove website configuration (check_mode)
    community.aws.s3_bucket_website:
      state: absent
      name: '{{ test_bucket }}'
    register: result
    check_mode: true

  - name: Assert check_mode shows changed
    assert:
      that:
        - result is changed

  - name: Remove website configuration
    community.aws.s3_bucket_website:
      state: absent
      name: '{{ test_bucket }}'
    register: result

  - name: Assert website configuration was removed
    assert:
      that:
        - result is changed

  - name: Get website configuration after deletion
    community.aws.s3_bucket_website_info:
      name: '{{ test_bucket }}'
    register: website_info

  - name: Assert website info shows no configuration
    assert:
      that:
        - website_info.website_configuration is not defined or website_info.website_configuration == {} or website_info.website_configuration.index_document is not defined

  - name: Remove website configuration idempotency (check_mode)
    community.aws.s3_bucket_website:
      state: absent
      name: '{{ test_bucket }}'
    register: result
    check_mode: true

  - name: Assert check_mode shows no change
    assert:
      that:
        - result is not changed

  - name: Remove website configuration idempotency
    community.aws.s3_bucket_website:
      state: absent
      name: '{{ test_bucket }}'
    register: result

  - name: Assert idempotency - no change (bucket has no website configuration)
    assert:
      that:
        - result is not changed

  # ============================================================
  # Cleanup
  # ============================================================

  always:
    - name: Remove website configuration
      community.aws.s3_bucket_website:
        name: '{{ test_bucket }}'
        state: absent
      ignore_errors: true

    - name: Delete test bucket
      amazon.aws.s3_bucket:
        name: '{{ test_bucket }}'
        state: absent
        force: true
      ignore_errors: true
