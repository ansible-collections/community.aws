---
# Integration tests for s3_metrics_configuration
#
# Notes:
# - The module only outputs 'changed' since its very simple
#
- module_defaults:
    group/aws:
      access_key: '{{ aws_access_key }}'
      secret_key: '{{ aws_secret_key }}'
      session_token: '{{ security_token | default(omit) }}'
      region: '{{ aws_region }}'
  collections:
    - amazon.aws
  block:


  # ============================================================
  - name: Try to create metrics configuration for non-existing bucket
    community.aws.s3_bucket_metrics_configuration:
      bucket_name: '{{ test_bucket }}'
      id: 'EntireBucket'
      state: present
    register: result
    ignore_errors: yes

  - assert:
      that:
      - result is failed

  # ============================================================
  - name: Create simple s3_bucket to act upon it
    s3_bucket:
      name: '{{ test_bucket }}'
      state: present
    register: output

  - assert:
      that:
      - output is changed
      - output.name == test_bucket

  # ============================================================
  - name: Create a metrics configuration under check mode
    community.aws.s3_bucket_metrics_configuration:
      bucket_name: '{{ test_bucket }}'
      id: 'EntireBucket'
      state: present
    check_mode: yes
    register: result

  - include_tasks: './s3_metrics_info.yml'

  - assert:
      that:
      - result is changed
      - metrics_info | selectattr('id', 'search', 'EntireBucket') | list | length == 0

  # ============================================================
  - name: Create a metrics configuration that enables metrics for an entire bucket
    community.aws.s3_bucket_metrics_configuration:
      bucket_name: '{{ test_bucket }}'
      id: 'EntireBucket'
      state: present
    register: result

  - include_tasks: './s3_metrics_info.yml'

  - assert:
      that:
      - result is changed
      - metrics_info | selectattr('id', 'search', 'EntireBucket') | list | length == 1

  # ============================================================
  - name: Create a metrics configuration idempotency under check mode
    community.aws.s3_bucket_metrics_configuration:
      bucket_name: '{{ test_bucket }}'
      id: 'EntireBucket'
      state: present
    check_mode: yes
    register: result

  - assert:
      that:
      - result is not changed

  # ============================================================
  - name: Create a metrics configuration idempotency
    community.aws.s3_bucket_metrics_configuration:
      bucket_name: '{{ test_bucket }}'
      id: 'EntireBucket'
      state: present
    register: result

  - assert:
      that:
      - result is not changed

  # ============================================================
  - name: Put a metrics configuration that enables metrics for objects starting with a prefix
    community.aws.s3_bucket_metrics_configuration:
      bucket_name: "{{ test_bucket }}"
      id: Assets
      filter_prefix: assets
      state: present
    register: result

  - include_tasks: './s3_metrics_info.yml'

  - assert:
      that:
      - result is changed
      - (metrics_info | selectattr('id', 'search', 'Assets') | list | first).filter.prefix == 'assets'

  # ============================================================
  - name: Update existing metrics configuration under check mode
    community.aws.s3_bucket_metrics_configuration:
      bucket_name: "{{ test_bucket }}"
      id: Assets
      filter_tag:
        kind: Asset
      state: present
    check_mode: yes
    register: result

  - include_tasks: './s3_metrics_info.yml'

  - assert:
      that:
      - result is changed
      - (metrics_info | selectattr('id', 'search', 'Assets') | list | first).filter.prefix == 'assets'
      - (metrics_info | selectattr('id', 'search', 'Assets') | list | first).filter.tags is not defined

  # ============================================================
  - name: Update existing metrics configuration and enable metrics for objects with specific tag
    community.aws.s3_bucket_metrics_configuration:
      bucket_name: "{{ test_bucket }}"
      id: Assets
      filter_tag:
        kind: Asset
      state: present
    register: result

  - include_tasks: './s3_metrics_info.yml'

  - assert:
      that:
      - result is changed
      - (metrics_info | selectattr('id', 'search', 'Assets') | list | first).filter.prefix is not defined
      - (metrics_info | selectattr('id', 'search', 'Assets') | list | first).filter.tags.kind == 'Asset'

  # ============================================================
  - name: Put a metrics configuration that enables metrics for objects that start with a particular prefix and have specific tags applied
    community.aws.s3_bucket_metrics_configuration:
      bucket_name: "{{ test_bucket }}"
      id: ImportantBlueDocuments
      filter_prefix: documents
      filter_tags:
        priority: High
        class: Blue
      state: present
    register: result

  - include_tasks: './s3_metrics_info.yml'

  - assert:
      that:
      - result is changed
      - (metrics_info | selectattr('id', 'search', 'ImportantBlueDocuments') | list | first).filter.prefix == 'documents'
      - (metrics_info | selectattr('id', 'search', 'ImportantBlueDocuments') | list | first).filter.tags.priority == 'High'
      - (metrics_info | selectattr('id', 'search', 'ImportantBlueDocuments') | list | first).filter.tags.class == 'Blue'

  # ============================================================
  - name: Delete metrics configuration in check mode
    community.aws.s3_bucket_metrics_configuration:
      bucket_name: '{{ test_bucket }}'
      id: 'EntireBucket'
      state: absent
    check_mode: yes
    register: result

  - include_tasks: './s3_metrics_info.yml'

  - assert:
      that:
      - result is changed
      - metrics_info | selectattr('id', 'search', 'EntireBucket') | list | length == 1 # still present

  # ============================================================
  - name: Delete metrics configuration
    community.aws.s3_bucket_metrics_configuration:
      bucket_name: '{{ test_bucket }}'
      id: 'EntireBucket'
      state: absent
    register: result

  - include_tasks: './s3_metrics_info.yml'

  - assert:
      that:
      - result is changed
      - metrics_info | selectattr('id', 'search', 'EntireBucket') | list | length == 0

  # ============================================================
  - name: Try to delete non-existing metrics configuration
    community.aws.s3_bucket_metrics_configuration:
      bucket_name: '{{ test_bucket }}'
      id: 'EntireBucket'
      state: absent
    register: result

  - assert:
      that:
      - result is not changed

  # ============================================================
  - name: Try to delete metrics configuration for non-existing bucket
    community.aws.s3_bucket_metrics_configuration:
      bucket_name: '{{ test_bucket }}-non-existing'
      id: 'EntireBucket'
      state: absent
    register: result

  - assert:
      that:
      - result is not changed

  # ============================================================
  always:
  - name: Delete test bucket
    s3_bucket:
      name: '{{ test_bucket }}'
      state: absent
    ignore_errors: yes
