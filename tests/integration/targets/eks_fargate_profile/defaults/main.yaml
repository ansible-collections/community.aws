eks_cluster_name: "{{ resource_prefix }}"
eks_fargate_profile_name_a: fp-template-a
eks_fargate_profile_name_b: fp-template-b

selectors:
  - namespace: "fp-default"

tags:
  foo: bar
  env: test

# VPC CIDR allocation - randomised to avoid conflicts
vpc_cidr: 10.{{ 256 | random(seed=resource_prefix) }}.156.0/22

eks_subnets:
  - zone: a
    cidr: "10.{{ 256 | random(seed=resource_prefix) }}.156.0/24"
    type: private
    tag: internal-elb
  - zone: b
    cidr: "10.{{ 256 | random(seed=resource_prefix) }}.157.0/24"
    type: public
    tag: elb

eks_security_groups:
  - name: "{{ eks_cluster_name }}-control-plane-sg"
    description: "EKS Control Plane Security Group"
    rules:
      - group_name: "{{ eks_cluster_name }}-workers-sg"
        group_desc: "EKS Worker Security Group"
        ports: 443
        proto: tcp
    rules_egress:
      - group_name: "{{ eks_cluster_name }}-workers-sg"
        group_desc: "EKS Worker Security Group"
        from_port: 1025
        to_port: 65535
        proto: tcp
  - name: "{{ eks_cluster_name }}-workers-sg"
    description: "EKS Worker Security Group"
    rules:
      - group_name: "{{ eks_cluster_name }}-workers-sg"
        proto: tcp
        from_port: 1
        to_port: 65535
      - group_name: "{{ eks_cluster_name }}-control-plane-sg"
        ports: 10250
        proto: tcp
