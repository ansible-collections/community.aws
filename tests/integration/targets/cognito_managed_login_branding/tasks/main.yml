---
- name: 'cognito_managed_login_branding integration tests'
  collections:
    - amazon.aws
  vars:
    ansible_python_interpreter: '{{ botocore_virtualenv_interpreter }}'
  module_defaults:
    group/aws:
      access_key: '{{ aws_access_key }}'
      secret_key: '{{ aws_secret_key }}'
      session_token: '{{ security_token | default(omit) }}'
      region: '{{ aws_region }}'

  block:
    - include_tasks: 01_prerequisites.yml

    - include_tasks: 10_branding.yml
      when: cognito_user_pool_id is defined

  always:
    - include_tasks: 99_cleanup.yml
