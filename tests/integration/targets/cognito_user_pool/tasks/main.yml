---
- name: 'cognito_user_pool integration tests'
  collections:
    - amazon.aws
  module_defaults:
    group/aws:
      access_key: '{{ aws_access_key }}'
      secret_key: '{{ aws_secret_key }}'
      session_token: '{{ security_token | default(omit) }}'
      region: '{{ aws_region }}'

  block:
    - include_tasks: 01_create.yml
    - include_tasks: 02_update.yml
    - include_tasks: 03_tags.yml
    - include_tasks: 04_delete.yml

  always:
    - include_tasks: 99_cleanup.yml
