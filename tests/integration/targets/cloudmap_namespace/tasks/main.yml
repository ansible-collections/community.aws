---
- module_defaults:
    group/aws:
      access_key: "{{ aws_access_key }}"
      secret_key: "{{ aws_secret_key }}"
      session_token: "{{ security_token | default(omit) }}"
      region: "{{ aws_region }}"
  block:
    # ============================================================
    # Public namespace — check_mode create
    # ============================================================
    - name: Create public namespace (check_mode)
      community.aws.cloudmap_namespace:
        state: present
        name: "{{ cloudmap_namespace_name }}"
        namespace_type: public
        description: "{{ cloudmap_description }}"
        tags:
          Environment: test
          CamelCase: value
      check_mode: true
      register: create_public_check

    - name: Assert check_mode create reports changed
      assert:
        that:
          - create_public_check is changed

    - name: Verify public namespace was not actually created
      community.aws.cloudmap_namespace:
        state: absent
        name: "{{ cloudmap_namespace_name }}"
        namespace_type: public
      register: verify_not_created

    - name: Assert namespace does not exist after check_mode create
      assert:
        that:
          - verify_not_created is not changed

    # ============================================================
    # Public namespace — create
    # ============================================================
    - name: Create public namespace
      community.aws.cloudmap_namespace:
        state: present
        name: "{{ cloudmap_namespace_name }}"
        namespace_type: public
        description: "{{ cloudmap_description }}"
        tags:
          Environment: test
          CamelCase: value
        wait: true
        wait_timeout: 300
      register: create_public

    - name: Assert public namespace was created
      assert:
        that:
          - create_public is changed
          - create_public.namespace.id is defined
          - create_public.namespace.type == "DNS_PUBLIC"
          - create_public.namespace.name == cloudmap_namespace_name

    # ============================================================
    # Public namespace — check_mode create (idempotent)
    # ============================================================
    - name: Create public namespace (check_mode, idempotent)
      community.aws.cloudmap_namespace:
        state: present
        name: "{{ cloudmap_namespace_name }}"
        namespace_type: public
        description: "{{ cloudmap_description }}"
        tags:
          Environment: test
          CamelCase: value
      check_mode: true
      register: create_public_check_idem

    - name: Assert check_mode create is idempotent
      assert:
        that:
          - create_public_check_idem is not changed

    # ============================================================
    # Public namespace — idempotency
    # ============================================================
    - name: Create public namespace (idempotency)
      community.aws.cloudmap_namespace:
        state: present
        name: "{{ cloudmap_namespace_name }}"
        namespace_type: public
        description: "{{ cloudmap_description }}"
        tags:
          Environment: test
          CamelCase: value
        wait: true
      register: create_public_idem

    - name: Assert public namespace was not changed
      assert:
        that:
          - create_public_idem is not changed

    # ============================================================
    # cloudmap_info — check_mode query by name
    # ============================================================
    - name: Get namespace info by name (check_mode)
      community.aws.cloudmap_info:
        namespace_name: "{{ cloudmap_namespace_name }}"
      check_mode: true
      register: info_by_name_check

    - name: Assert check_mode info returns correct data
      assert:
        that:
          - info_by_name_check.namespace.name == cloudmap_namespace_name
          - info_by_name_check.namespace.type == "DNS_PUBLIC"
          - info_by_name_check.namespace.id is defined
          - info_by_name_check.namespace.arn is defined
          - info_by_name_check.services is defined

    # ============================================================
    # cloudmap_info — query by name
    # ============================================================
    - name: Get namespace info by name
      community.aws.cloudmap_info:
        namespace_name: "{{ cloudmap_namespace_name }}"
      register: info_by_name

    - name: Assert info by name returned correct namespace
      assert:
        that:
          - info_by_name.namespace.name == cloudmap_namespace_name
          - info_by_name.namespace.type == "DNS_PUBLIC"
          - info_by_name.namespace.id is defined
          - info_by_name.namespace.arn is defined
          - info_by_name.services is defined

    # ============================================================
    # cloudmap_info — query by ID
    # ============================================================
    - name: Get namespace info by ID
      community.aws.cloudmap_info:
        namespace_id: "{{ info_by_name.namespace.id }}"
      register: info_by_id

    - name: Assert info by ID returned same namespace
      assert:
        that:
          - info_by_id.namespace.id == info_by_name.namespace.id
          - info_by_id.namespace.name == cloudmap_namespace_name
          - info_by_id.namespace.type == "DNS_PUBLIC"

    # ============================================================
    # VPC setup for private namespace
    # ============================================================
    - name: Create VPC for private namespace
      amazon.aws.ec2_vpc_net:
        name: "{{ resource_prefix }}-cloudmap-vpc"
        cidr_block: "10.0.0.0/16"
        state: present
      register: vpc_result

    # ============================================================
    # Private namespace — check_mode create
    # ============================================================
    - name: Create private namespace (check_mode)
      community.aws.cloudmap_namespace:
        state: present
        name: "{{ cloudmap_private_namespace_name }}"
        namespace_type: private
        vpc: "{{ vpc_result.vpc.id }}"
        description: "{{ cloudmap_description }}"
      check_mode: true
      register: create_private_check

    - name: Assert check_mode create private reports changed
      assert:
        that:
          - create_private_check is changed

    - name: Verify private namespace was not actually created
      community.aws.cloudmap_namespace:
        state: absent
        name: "{{ cloudmap_private_namespace_name }}"
        namespace_type: private
      register: verify_private_not_created

    - name: Assert private namespace does not exist after check_mode create
      assert:
        that:
          - verify_private_not_created is not changed

    # ============================================================
    # Private namespace — create
    # ============================================================
    - name: Create private namespace
      community.aws.cloudmap_namespace:
        state: present
        name: "{{ cloudmap_private_namespace_name }}"
        namespace_type: private
        vpc: "{{ vpc_result.vpc.id }}"
        description: "{{ cloudmap_description }}"
        wait: true
        wait_timeout: 300
      register: create_private

    - name: Assert private namespace was created
      assert:
        that:
          - create_private is changed
          - create_private.namespace.id is defined
          - create_private.namespace.type == "DNS_PRIVATE"
          - create_private.namespace.name == cloudmap_private_namespace_name

    # ============================================================
    # Private namespace — check_mode create (idempotent)
    # ============================================================
    - name: Create private namespace (check_mode, idempotent)
      community.aws.cloudmap_namespace:
        state: present
        name: "{{ cloudmap_private_namespace_name }}"
        namespace_type: private
        vpc: "{{ vpc_result.vpc.id }}"
        description: "{{ cloudmap_description }}"
      check_mode: true
      register: create_private_check_idem

    - name: Assert check_mode create private is idempotent
      assert:
        that:
          - create_private_check_idem is not changed

    # ============================================================
    # Private namespace — idempotency
    # ============================================================
    - name: Create private namespace (idempotency)
      community.aws.cloudmap_namespace:
        state: present
        name: "{{ cloudmap_private_namespace_name }}"
        namespace_type: private
        vpc: "{{ vpc_result.vpc.id }}"
        description: "{{ cloudmap_description }}"
        wait: true
      register: create_private_idem

    - name: Assert private namespace was not changed
      assert:
        that:
          - create_private_idem is not changed

    # ============================================================
    # Public namespace — check_mode delete
    # ============================================================
    - name: Delete public namespace (check_mode)
      community.aws.cloudmap_namespace:
        state: absent
        name: "{{ cloudmap_namespace_name }}"
        namespace_type: public
      check_mode: true
      register: delete_public_check

    - name: Assert check_mode delete reports changed
      assert:
        that:
          - delete_public_check is changed

    - name: Verify public namespace still exists after check_mode delete
      community.aws.cloudmap_info:
        namespace_name: "{{ cloudmap_namespace_name }}"
      register: verify_still_exists

    - name: Assert namespace still exists
      assert:
        that:
          - verify_still_exists.namespace.name == cloudmap_namespace_name
          - verify_still_exists.namespace.type == "DNS_PUBLIC"

    # ============================================================
    # Public namespace — delete
    # ============================================================
    - name: Delete public namespace
      community.aws.cloudmap_namespace:
        state: absent
        name: "{{ cloudmap_namespace_name }}"
        namespace_type: public
        wait: true
        wait_timeout: 300
      register: delete_public

    - name: Assert public namespace was deleted
      assert:
        that:
          - delete_public is changed

    # ============================================================
    # Public namespace — check_mode delete (idempotent)
    # ============================================================
    - name: Delete public namespace (check_mode, idempotent)
      community.aws.cloudmap_namespace:
        state: absent
        name: "{{ cloudmap_namespace_name }}"
        namespace_type: public
      check_mode: true
      register: delete_public_check_idem

    - name: Assert check_mode delete is idempotent
      assert:
        that:
          - delete_public_check_idem is not changed

    # ============================================================
    # Public namespace — delete idempotency
    # ============================================================
    - name: Delete public namespace (idempotency)
      community.aws.cloudmap_namespace:
        state: absent
        name: "{{ cloudmap_namespace_name }}"
        namespace_type: public
      register: delete_public_idem

    - name: Assert public namespace delete is idempotent
      assert:
        that:
          - delete_public_idem is not changed

    # ============================================================
    # Private namespace — check_mode delete
    # ============================================================
    - name: Delete private namespace (check_mode)
      community.aws.cloudmap_namespace:
        state: absent
        name: "{{ cloudmap_private_namespace_name }}"
        namespace_type: private
      check_mode: true
      register: delete_private_check

    - name: Assert check_mode delete private reports changed
      assert:
        that:
          - delete_private_check is changed

    - name: Verify private namespace still exists after check_mode delete
      community.aws.cloudmap_info:
        namespace_name: "{{ cloudmap_private_namespace_name }}"
      register: verify_private_still_exists

    - name: Assert private namespace still exists
      assert:
        that:
          - verify_private_still_exists.namespace.name == cloudmap_private_namespace_name
          - verify_private_still_exists.namespace.type == "DNS_PRIVATE"

    # ============================================================
    # Private namespace — delete
    # ============================================================
    - name: Delete private namespace
      community.aws.cloudmap_namespace:
        state: absent
        name: "{{ cloudmap_private_namespace_name }}"
        namespace_type: private
        wait: true
        wait_timeout: 300
      register: delete_private

    - name: Assert private namespace was deleted
      assert:
        that:
          - delete_private is changed

    # ============================================================
    # Delete non-existent namespace
    # ============================================================
    - name: Delete non-existent namespace
      community.aws.cloudmap_namespace:
        state: absent
        name: "this-namespace-does-not-exist.example.com"
        namespace_type: public
      register: delete_nonexistent

    - name: Assert deleting non-existent namespace is not changed
      assert:
        that:
          - delete_nonexistent is not changed

    # ============================================================
    # check_mode delete non-existent namespace
    # ============================================================
    - name: Delete non-existent namespace (check_mode)
      community.aws.cloudmap_namespace:
        state: absent
        name: "this-namespace-does-not-exist.example.com"
        namespace_type: public
      check_mode: true
      register: delete_nonexistent_check

    - name: Assert check_mode delete non-existent is not changed
      assert:
        that:
          - delete_nonexistent_check is not changed

  always:
    - name: Clean up test resources
      include_tasks: 99_cleanup.yml
